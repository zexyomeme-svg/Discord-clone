services:
  - type: web
    name: discord-clone-render
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      npm ci
      npm run build
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: NODE_VERSION
        value: 20.20.2
